name: ticketpeak
services:
  # Database chính hỗ trợ UUID v7 native
  postgres:
    image: postgres:18-alpine
    container_name: ticketpeak-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    networks:
      - ticketpeak-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis cho Caching, Rate Limiting và ABAC Policy Cache
  redis:
    image: redis:7-alpine
    container_name: ticketpeak-redis

    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6377}:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ticketpeak-network
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD}

  # MinIO - Giải pháp thay thế AWS S3 để lưu trữ ảnh Event, Avatar
  minio:
    image: minio/minio
    container_name: ticketpeak-minio
    ports:
      - "9000:9000"       # API port
      - "9001:9001"       # Console UI port
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ticketpeak-network
    command: server /data --console-address ":9001"

  # Backend (Dockerfile bạn vừa tạo)
  ticketpeak-api:
    build: .
    container_name: ticketpeak-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - ticketpeak-network

networks:
  ticketpeak-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data: