# ── App custom properties ─────────────────────────────────────────────────────
app:
  version: ${APP_VERSION:0.0.1}
  jwt:
    secret: ${JWT_SECRET:ticketpeak-development-secret-key-ticketpeak-development-secret-key}
    access-token-expiry: 900
    refresh-token-expiry: 604800
  s3:
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    access-key: ${S3_ACCESS_KEY:storage}
    secret-key: ${S3_SECRET_KEY:ilovestorage}
    bucket-name: ${S3_BUCKET_NAME:ticketpeak-storage}
    region: ${S3_REGION:ap-southeast-1}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600

