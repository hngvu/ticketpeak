spring:
  application:
    name: ${APP_NAME:ticketpeak-api}
  config:
    import: optional:file:.env
  docker:
    compose:
      enabled: false
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/${POSTGRES_DB:ticketpeak_db}}
    username: ${POSTGRES_USER:pg}
    password: ${POSTGRES_PASSWORD:ilovepostgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: ticketpeak-pool
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  # ── JPA / Hibernate ─────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema — Hibernate chỉ validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 50
        jdbc:
          time_zone: UTC
    open-in-view: false           # Tắt OSIV để tránh lazy-load ngoài transaction

  # ── Flyway ──────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false
    ignore-migration-patterns: "*:ignored"

  # ── Redis ───────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6377}
      password: ${REDIS_PASSWORD:iloveredis}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  # ── Cache (Redis) ────────────────────────────────────────────────────────────
  cache:
    type: redis
    redis:
      time-to-live: 600000        # 10 phút mặc định (ms)
      cache-null-values: false

  # ── DevTools ─────────────────────────────────────────────────────────────────
  devtools:
    restart:
      enabled: false

# ── Server ───────────────────────────────────────────────────────────────────
server:
  port: ${APP_PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/plain
  error:
    include-message: never        # Không lộ stack trace ra client

# ── Actuator ─────────────────────────────────────────────────────────────────
management:
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true             # /actuator/health/liveness & /readiness cho K8s
  info:
    env:
      enabled: true

# ── App custom properties ─────────────────────────────────────────────────────
app:
  version: ${APP_VERSION:0.0.1}

  jwt:
    secret: ${JWT_SECRET:ticketpeak-development-secret-key-ticketpeak-development-secret-key}
    access-token-expiry: 900      # 15 phút (giây)
    refresh-token-expiry: 604800  # 7 ngày (giây)

  s3:
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    access-key: ${S3_ACCESS_KEY:storage}
    secret-key: ${S3_SECRET_KEY:ilovestorage}
    bucket-name: ${S3_BUCKET_NAME:ticketpeak-storage}
    region: ${S3_REGION:ap-southeast-1} 

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600

# ── Reservation ─────────────────────────────────────────────────────────────
reservation:
  ttl-minutes: 15
  expiry-job:
    delay-ms: 60000      # Run expiry sweep every 60 seconds
    batch-size: 100      # Max reservations expired per sweep

# ── Payment ─────────────────────────────────────────────────────────────────
payment:
  vnpay:
    tmn-code: ${VNPAY_TMN_CODE:DEMO2014}
    hash-secret: ${VNPAY_HASH_SECRET:3E4DFD39EE75E5903C187F4A128B4F21}
    pay-url: ${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
    return-url: ${VNPAY_RETURN_URL:http://localhost:5173/payment/vnpay/return}
    ipn-url: ${VNPAY_IPN_URL:http://localhost:8080/api/payments/vnpay/ipn}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:sk_test_mock}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_mock}


# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    io.qzz.hoangvu.ticketpeak.api: DEBUG
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [traceId=%X{traceId:-},spanId=%X{spanId:-}] %logger{36} - %msg%n"

# ── SpringDoc / Swagger UI ────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

# ── Ticket Module (TOTP) ──────────────────────────────────────────────────────
ticketpeak:
  totp:
    encryption-key: ${TOTP_ENCRYPTION_KEY:QUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUE=}
  encryption:
    secret-key: ${ENCRYPTION_SECRET_KEY:dGhpcy1pcy1hLTMyLWJ5dGUtYWVzLWtleS1mb3ItdGU=}

# ── Resilience4j ──────────────────────────────────────────────────────────────
resilience4j:
  retry:
    instances:
      externalPaymentAPI:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.client.ResourceAccessException
  timelimiter:
    instances:
      externalPaymentAPI:
        timeout-duration: 3s
        cancel-running-future: true
  ratelimiter:
    instances:
      publicAPI:
        limit-for-period: 20
        limit-refresh-period: 1s
        timeout-duration: 0s

# ── Tracing ───────────────────────────────────────────────────────────────────
